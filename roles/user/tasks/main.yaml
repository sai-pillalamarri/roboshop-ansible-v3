- name: app setup
  import_role:
    name: common
    tasks_from: app-setup

- name: nodejs setup
  import_role:
    name: common
    tasks_from: nodejs

- name: setup user service file
  import_role:
    name: common
    tasks_from: service-file-setup
  notify: daemon reload 

- name: enable and start the service
  import_role:
    name: common
    tasks_from: restart