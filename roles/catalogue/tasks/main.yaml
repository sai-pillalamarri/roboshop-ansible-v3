- name: app setup
  import_role:
    name: common
    tasks_from: app-setup
  
- name: nodejs setup
  import_role:
    name: common
    tasks_from: nodejs

- name: service file setup
  import_role:
    name: common
    tasks_from: service-file-setup
  notify: daemon reload

- name: copy mongo repo
  copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: install mongo client package
  package:
    name: mongodb-mongosh 
    state: present

- name: check catalogue schema exists or not
  shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output
  tags:
  - mongodb

# - name: print catalogue output
#   debug:
#     msg: "{{ catalogue_output }}"

- name: load products
  shell: mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js
  when: catalogue_output.stdout | int < 0
  tags:
  - mongodb

- name: enable and start catalogue service
  import_role:
    name: common
    tasks_from: restart
